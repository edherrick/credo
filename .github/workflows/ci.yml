name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint, check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run check
      - run: npm run build

  backend:
    name: Backend (migrations, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: credo
          POSTGRES_USER: credo
          POSTGRES_PASSWORD: credo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U credo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://credo:credo@localhost:5432/credo
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - run: pip install -e ".[dev]"

      # Validates that every migration applies cleanly against a real PostGIS
      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest
